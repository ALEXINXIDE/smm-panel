; ==============================================================================
; docker/php/php.ini — Production PHP Configuration
; ==============================================================================

; ── Security ──────────────────────────────────────────────────────────────────

; Never expose PHP version in HTTP headers or error pages
expose_php = Off

; Disable functions that could be used to execute OS commands
; (remove any that your app genuinely needs)
disable_functions = exec,passthru,shell_exec,system,popen,parse_ini_file,show_source

; Prevent PHP errors from appearing in HTTP responses
; All errors go to the log, not the browser
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Uploads ───────────────────────────────────────────────────────────────────
; Limit upload size to prevent memory exhaustion attacks
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 5

; ── Execution Limits ──────────────────────────────────────────────────────────
max_execution_time = 30       ; 30 seconds for web requests
max_input_time = 30
memory_limit = 256M           ; Generous for SMM operations; cap to prevent runaway jobs

; ── Session Security ──────────────────────────────────────────────────────────
; Laravel manages sessions via its own Session driver (Redis),
; but these PHP session settings are a safety net.
session.cookie_secure = 1     ; Only send over HTTPS
session.cookie_httponly = 1   ; Inaccessible to JavaScript (XSS protection)
session.cookie_samesite = Lax ; CSRF protection
session.use_strict_mode = 1   ; Reject unrecognized session IDs
session.gc_maxlifetime = 7200

; ── OPcache ───────────────────────────────────────────────────────────────────
; OPcache compiles PHP files once and caches the bytecode.
; This is the single biggest PHP performance improvement available.
opcache.enable = 1
opcache.enable_cli = 0         ; Not needed for CLI commands (artisan)
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0  ; PRODUCTION: disable to prevent stat() calls on every request
                                   ; After deployment, run: php artisan opcache:clear
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.save_comments = 1      ; Required for Laravel's annotation-based features

; ── Date / Timezone ───────────────────────────────────────────────────────────
date.timezone = UTC            ; Always UTC in production; convert in application layer

; ── Real Path Cache ───────────────────────────────────────────────────────────
; Reduces stat() calls for file path lookups
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ── Misc ──────────────────────────────────────────────────────────────────────
default_charset = UTF-8
short_open_tag = Off
zlib.output_compression = Off  ; Let Nginx handle gzip (more efficient)
