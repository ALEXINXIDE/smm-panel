# ══════════════════════════════════════════════════════════════════════════════
# nixpacks.toml — Railway Build Configuration
# ONE file. ONE system. Predictable deploys.
# ══════════════════════════════════════════════════════════════════════════════

[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_pgsql",
    "php82Extensions.mbstring",
    "php82Extensions.xml",
    "php82Extensions.curl",
    "php82Extensions.zip",
    "php82Extensions.bcmath",
    "php82Extensions.redis",
    "php82Extensions.intl",
    "php82Extensions.gd",
    "php82Extensions.tokenizer",
    "php82Extensions.ctype",
    "php82Extensions.fileinfo",
    "php82Extensions.openssl",
    "php82Extensions.pcntl",
    "php82Extensions.posix",
    "php82Extensions.opcache",
    "nodejs_20",
    "nodePackages.npm"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --no-scripts",
    "npm install --no-audit --no-fund"
]

[phases.build]
cmds = [
    "npm run build",
    "mkdir -p storage/logs storage/framework/sessions storage/framework/views storage/framework/cache/data bootstrap/cache",
    "chmod -R 775 storage bootstrap/cache"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php -d opcache.enable_cli=1 -d opcache.enable=1 -d opcache.memory_consumption=128 -d opcache.max_accelerated_files=10000 -d opcache.validate_timestamps=0 -d opcache.jit_buffer_size=64M -d opcache.jit=tracing -S 0.0.0.0:$PORT -t public"
